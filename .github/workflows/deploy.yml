name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - 'generate_pdf.py'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow

      - name: Generate HTML
        run: python generate_pdf.py

      - name: Copy to index.html for GitHub Pages
        run: cp eesti_keele_kursus.html index.html

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add eesti_keele_kursus.html index.html manifest.json sw.js icon-192.png icon-512.png
          git diff --staged --quiet || git commit -m "Auto-update HTML from Markdown"
          git push
